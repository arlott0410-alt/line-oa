name = "line-oa-worker"
main = "workers/src/index.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# SUPABASE_URL - ใส่ตรงนี้จะไม่หายเมื่อ deploy (แก้ไขก่อน push/deploy)
# คัดลอกจาก Supabase Dashboard → Settings → API → Project URL
SUPABASE_URL = "https://YOUR_PROJECT_REF.supabase.co"

# Secrets (ตั้งใน Dashboard หรือ wrangler secret put):
# SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY, R2_PUBLIC_BASE_URL

# R2 bucket for user-sent images
# Deploy via Dashboard: สร้าง bucket ใน R2 → Worker Settings → R2 bucket bindings → Add IMAGES_BUCKET
# (wrangler.toml ใช้เป็น reference เท่านั้น เพราะ deploy ไม่ใช้ wrangler)
[[r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "line-oa-images"
